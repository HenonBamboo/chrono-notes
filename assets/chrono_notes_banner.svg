<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title id="title">ChronoNotes project banner</title>
  <desc id="desc">A polished desktop notes application banner showing time-based note cards, local storage, and AI summary cues.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.45" stop-color="#fff4b8"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="card" x1="360" y1="86" x2="1048" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fffdf4"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-16%" width="124%" height="132%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#172033" flood-opacity="0.16"/>
